name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: oven-sh/setup-bun@v2
        with:
          # Pin explicitly so setup-bun doesn't resolve the `engines.bun`
          # semver range via the GitHub tags API, which intermittently 404s.
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests (CI reporter)
        run: bun run test:ci

      - name: Aggregate quality checks
        run: bun run check:all

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bun-test-coverage
          path: coverage/lcov.info
          if-no-files-found: warn

      - name: Upload test junit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bun-test-junit
          path: junit.xml
          if-no-files-found: warn

      - name: Test timing summary
        if: always()
        run: bun run report:timing

      - name: Code-quality metrics summary
        if: always()
        run: bun run report:quality
